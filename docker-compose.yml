version: "3.8"

# ─────────────────────────────────────────────────────────────
# opentrend — custom services*#
# The prof's 3 containers (hadoop-master, hadoop-worker1,
# hadoop-worker2) are started separately with docker run.
# This file only manages the 3 containers YOU build.
#
# Prerequisites before running this file:
#   docker start hadoop-master hadoop-worker1 hadoop-worker2
#   (then inside hadoop-master: start hadoop, kafka, hbase)
# ─────────────────────────────────────────────────────────────

networks:
  hadoop:
    external: true   # joins the network created in Step 0

services:

  # ── 1. PRODUCER ───────────────────────────────────────────
  # Polls GitHub Events API every 60s and publishes raw events
  # to Kafka on hadoop-master:9092
  producer:
    build: ./producer
    container_name: opentrend-producer
    restart: unless-stopped
    networks:
      - hadoop
    environment:
      - KAFKA_HOST=hadoop-master:9092
      - KAFKA_TOPIC=github-events
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - POLL_INTERVAL=60          # seconds between API polls
    volumes:
      - ./producer:/app           # live reload during development
    depends_on: []                # hadoop-master is external, no depends_on needed

  # ── 2. SPARK RUNNER ───────────────────────────────────────
  # Holds your PySpark jobs. The streaming job runs on startup.
  # Batch job orchestration is handled by Airflow DAG.
  # Submits to YARN on hadoop-master.
  # Batch input is read from HDFS only.
  spark:
    build: ./spark
    container_name: opentrend-spark
    restart: unless-stopped
    networks:
      - hadoop
    environment:
      - HADOOP_CONF_DIR=/etc/hadoop
      - YARN_CONF_DIR=/etc/hadoop
      - KAFKA_HOST=hadoop-master:9092
      - KAFKA_TOPIC=github-events
      - STREAM_CHECKPOINT=hdfs://hadoop-master:9000/user/root/opentrend/checkpoints/streaming-v3
      - HBASE_HOST=hadoop-master
      - HDFS_HOST=hadoop-master:9000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./spark:/app              # your .py job files
    command: >
      spark-submit
        --master yarn
        --deploy-mode client
        --conf spark.hadoop.yarn.resourcemanager.hostname=hadoop-master
        --conf spark.hadoop.yarn.resourcemanager.address=hadoop-master:8032
        --conf spark.hadoop.yarn.resourcemanager.scheduler.address=hadoop-master:8030
        --conf spark.hadoop.yarn.resourcemanager.resource-tracker.address=hadoop-master:8031
        --conf spark.hadoop.yarn.resourcemanager.admin.address=hadoop-master:8033
        --conf spark.hadoop.fs.defaultFS=hdfs://hadoop-master:9000
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
        /app/streaming_job.py

  
  # ── 5. HBASE EXPLORER (STREAMLIT) ────────────────────────
  streamlit:
    build: ./streamlit_app
    container_name: opentrend-streamlit
    restart: unless-stopped
    networks:
      - hadoop
    ports:
      - "8501:8501"
      - "3000:8501"
    environment:
      - HBASE_HOST=hadoop-master
      - HBASE_PORT=9090
      - STREAMLIT_DEFAULT_LIMIT=50
    depends_on: []

  # ── 6. AIRFLOW (BATCH ORCHESTRATOR) ─────────────────────
  airflow:
    build: ./airflow
    container_name: opentrend-airflow
    restart: unless-stopped
    networks:
      - hadoop
    profiles:
      - airflow
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: standalone